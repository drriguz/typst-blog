name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-linuxlibertine \
            fonts-cmu \
            fonts-cascadia-code \
            fonts-noto-cjk

      - name: Get submodule revision
        id: submodule
        run: echo "rev=$(git rev-parse HEAD:typst-src)" >> "$GITHUB_OUTPUT"

      - name: Cache modified Typst
        id: cache-typst
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/typst
          key: typst-modified-${{ steps.submodule.outputs.rev }}

      - name: Build modified Typst
        if: steps.cache-typst.outputs.cache-hit != 'true'
        run: |
          cd typst-src
          cargo build --release -p typst-cli
          sudo cp target/release/typst /usr/local/bin/typst

      - name: Build blog
        run: cargo run -- build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: output/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
