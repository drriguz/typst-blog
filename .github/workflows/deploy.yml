name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            typst-src/target
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: static/fonts
          key: fonts-v1

      - name: Download fonts
        run: |
          mkdir -p static/fonts

          # Source Han Sans SC (Chinese)
          [ -f static/fonts/SourceHanSansSC-Regular.otf ] || {
            curl -sL "https://github.com/adobe-fonts/source-han-sans/releases/download/2.005R/09_SourceHanSansSC.zip" -o /tmp/shs.zip
            unzip -j /tmp/shs.zip "*.otf" -d static/fonts/
            rm /tmp/shs.zip
          }

          # FiraMath (Math)
          [ -f static/fonts/FiraMath-Regular.otf ] || {
            curl -sL "https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf" -o static/fonts/FiraMath-Regular.otf
          }

          # Cascadia Code (Mono)
          [ -f static/fonts/CascadiaCode-Regular.ttf ] || {
            curl -sL "https://github.com/microsoft/cascadia-code/releases/download/v2407.24/CascadiaCode-2407.24.zip" -o /tmp/cascadia.zip
            unzip -j /tmp/cascadia.zip "ttf/static/CascadiaCode-Regular.ttf" -d static/fonts/
            rm /tmp/cascadia.zip
          }

      - name: Build modified Typst
        run: |
          cd typst-src
          cargo build --release -p typst-cli
          cp target/release/typst ../typst-modified

      - name: Build blog
        run: cargo run -- build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: output/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
