<!DOCTYPE html>
<html lang="{{ lang | default(value='en') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="stylesheet" href="{{ root_path }}css/style.css">


</head>

<body>
    <header class="site-header">
        <nav>
            <a href="{{ root_path }}" class="site-title">
                <img src="{{ root_path }}logo.svg" alt="Logo" class="site-logo">
                drriguz
            </a>
            <div class="site-nav">
                <a href="{{ root_path }}">Home</a>
                <a href="{{ root_path }}tags-all/">Tags</a>
                <a href="https://github.com/drriguz" target="_blank">GitHub</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>Powered by <a href="https://github.com/drriguz/typst-blog">typst-blog</a> &mdash; Built with Typst</p>
    </footer>
</body>

</html>
