<!DOCTYPE html>
<html lang="{{ lang | default(value='en') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}一个日牯子{% endblock %}</title>
    <link rel="icon" href="{{ root_path }}Yoda.png" type="image/png">
    <link rel="stylesheet" href="{{ root_path }}css/style.css">

    <style>
        @font-face {
            font-family: 'Source Han Sans SC';
            src: url('/fonts/SourceHanSansSC-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'FiraMath';
            src: url('/fonts/FiraMath-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Cascadia Code';
            src: url('/fonts/CascadiaCode-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <nav>
            <a href="{{ root_path }}" class="site-title">
                <img src="{{ root_path }}Yoda.png" alt="Logo" class="site-logo">
                一个日牯子
            </a>
            <div class="site-nav">
                <a href="{{ root_path }}">Home</a>
                <a href="{{ root_path }}tags-all/">Tags</a>
                <a href="https://github.com" target="_blank">GitHub</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>Powered by <a href="https://github.com/your-username/typst-blog">typst-blog</a> &mdash; Built with Typst</p>
    </footer>
</body>

</html>
