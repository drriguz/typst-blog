{% extends "base.html" %}

{% block title %}All Tags - 一个日牯子{% endblock %}

{% block content %}
<div class="post-list">
    <h1>All Tags</h1>
    <div class="tags-cloud">
        {% for tag in tags %}
        <a href="{{ root_path }}tags/{{ tag.name }}/" class="tag tag-cloud-item">
            {{ tag.name }} <span class="tag-count">({{ tag.count }})</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
